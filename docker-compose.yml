services:
  web:
    image: node:22-alpine
    working_dir: /workspace/apps/web
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      FASTAPI_BASE_URL: http://api:8000
      API_BASE_URL: http://api:8000
    volumes:
      - ./apps/web:/workspace/apps/web
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/login').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 20s
      timeout: 5s
      retries: 6
    depends_on:
      - api

  api:
    build:
      context: ./services/tax-engine
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./services/tax-engine:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 6
    depends_on:
      - redis

  worker:
    build:
      context: ./services/tax-engine
    command: python -m app.workers.tasks
    env_file:
      - .env
    volumes:
      - ./services/tax-engine:/app
    depends_on:
      - redis

  scheduler:
    build:
      context: ./services/tax-engine
    command: python -m app.workers.scheduler
    env_file:
      - .env
    volumes:
      - ./services/tax-engine:/app
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
